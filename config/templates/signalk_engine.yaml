# ============================
#   PROPULSION HELPERS (Trigger-Based)
#   Keeps last valid value
# ============================

- trigger:
    - platform: state
      entity_id: sensor.signalk_engine_rpm
  sensor:
    - name: "Engine RPM"
      unique_id: "helper_engine_rpm"
      unit_of_measurement: "rpm"
      state: >
        {% set v = trigger.to_state.state %}
        {% if v not in ['unknown','unavailable','none',''] %}
          {{ v | float | round(0) }}
        {% else %}
          {{ this.state }}
        {% endif %}

- trigger:
    - platform: state
      entity_id: sensor.signalk_engine_temp
  sensor:
    - name: "Engine Temperature"
      unique_id: "helper_engine_temp"
      unit_of_measurement: "°C"
      state: >
        {% set v = trigger.to_state.state %}
        {% if v not in ['unknown','unavailable','none',''] %}
          {{ v | float | round(1) }}
        {% else %}
          {{ this.state }}
        {% endif %}
