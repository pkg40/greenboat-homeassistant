# ============================
#   Anchorage Logic Templates
# ============================

# Distance from Anchorage
- sensor:
    - name: "Anchorage Distance"
      unique_id: anchorage_distance
      unit_of_measurement: "m"
      state: >
        {{ distance('device_tracker.usb_tracker', 'device_tracker.anchorage_tracker') * 1000 }}
      attributes:
        kilometers: >
          {{ distance('device_tracker.usb_tracker', 'device_tracker.anchorage_tracker') }}
        nautical_miles: >
          {{ (distance('device_tracker.usb_tracker', 'device_tracker.anchorage_tracker') * 1000 / 1852) | round(3) }}
        miles: >
          {{ (distance('device_tracker.usb_tracker', 'device_tracker.anchorage_tracker') * 1000 / 1609.344) | round(3) }}
        bearing: >
          {{ bearing(
              state_attr('device_tracker.usb_tracker', 'latitude'),
              state_attr('device_tracker.usb_tracker', 'longitude'),
              state_attr('device_tracker.anchorage_tracker', 'latitude'),
              state_attr('device_tracker.anchorage_tracker', 'longitude')
          ) | round(1) }}
        from_lat: "{{ state_attr('device_tracker.usb_tracker', 'latitude') }}"
        from_lon: "{{ state_attr('device_tracker.usb_tracker', 'longitude') }}"
        to_lat: "{{ state_attr('device_tracker.anchorage_tracker', 'latitude') }}"
        to_lon: "{{ state_attr('device_tracker.anchorage_tracker', 'longitude') }}"

# Vessel inside anchorage radius
- binary_sensor:
    - name: "In Anchorage"
      unique_id: in_anchorage
      state: >
        {% set dist_m = states('sensor.anchorage_distance') | float(0) %}
        {% set radius_m = states('input_number.anchorage_radius') | float(0) %}
        {{ dist_m <= radius_m }}
      attributes:
        distance_m: "{{ dist_m }}"
        radius_m: "{{ radius_m }}"
        distance_nm: "{{ (dist_m / 1852) | round(3) }}"
        bearing: >
          {{ bearing(
              state_attr('device_tracker.peter_phone', 'latitude'),
              state_attr('device_tracker.peter_phone', 'longitude'),
              state_attr('device_tracker.truck_gps', 'latitude'),
              state_attr('device_tracker.truck_gps', 'longitude')
          ) | round(1) }}

# tracker Entity
- device_tracker:
    - name: "anchorage_tracker"
      unique_id: anchorage_tracker
      icon: mdi:anchor
      latitude: >
        {{ states('input_number.anchorage_latitude') | float }}
      longitude: >
        {{ states('input_number.anchorage_longitude') | float }}
