- trigger:
    - platform: state
      entity_id:
        - sensor.start_battery_state
        - sensor.house_battery_state
    - platform: homeassistant
      event: start
  sensor:
    - name: "Battery System Status"
      unique_id: "helper_battery_system_status"
      state: >
        {% set s = states('sensor.start_battery_state') %}
        {% set h = states('sensor.house_battery_state') %}

        {# If either is unknown, unavailable, or empty, keep last good value #}
        {% if s in ['unknown','unavailable','none',''] 
              or h in ['unknown','unavailable','none',''] %}
          {{ this.state }}
        {% else %}

          {# Disconnected cases #}
          {% if s == 'disconnected' and h == 'disconnected' %}
            both_disconnected
          {% elif s == 'disconnected' %}
            start_disconnected
          {% elif h == 'disconnected' %}
            house_disconnected

          {# Critical cases #}
          {% elif s == 'veryLow' or h == 'veryLow' %}
            critical

          {# Low cases #}
          {% elif s == 'low' or h == 'low' %}
            low

          {# Charging cases #}
          {% elif s == 'charging' and h == 'charging' %}
            charging
          {% elif s == 'charging' %}
            start_charging
          {% elif h == 'charging' %}
            house_charging

          {# Resting #}
          {% elif s == 'resting' and h == 'resting' %}
            resting

          {# Discharging #}
          {% elif s == 'discharging' and h == 'discharging' %}
            discharging

          {# Mixed fallback #}
          {% else %}
            mixed
          {% endif %}
        {% endif %}
