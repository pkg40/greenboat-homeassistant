# ---------------------------
# COG MAGNETIC (degrees)
# ---------------------------
- trigger:
    - platform: state
      entity_id:
        - sensor.signalk_navigation_courseOverGroundMagnetic
        - sensor.raw_cog_mag
        - input_boolean.use_derived_data
  sensor:
    - name: "COG Magnetic"
      unique_id: "helper_cog_mag"
      unit_of_measurement: "°"
      state: >
        {% set use_dd = is_state('input_boolean.use_derived_data', 'on') %}
        {% set dd = trigger.to_state.state if trigger.entity_id == 'sensor.signalk_navigation_courseOverGroundMagnetic' else states('sensor.signalk_navigation_courseOverGroundMagnetic') %}
        {% set raw = trigger.to_state.state if trigger.entity_id == 'sensor.raw_cog_mag' else states('sensor.raw_cog_mag') %}
        {% set rad = dd if (use_dd and dd not in ['unknown','unavailable','none','']) else raw %}
        {% if rad not in ['unknown','unavailable','none',''] %}
          {{ ((rad | float * 57.2958) % 360) | round(1) }}
        {% else %}
          {{ this.state }}
        {% endif %}

