# ============================
# Navigation Helpers (Trigger-Based)
# Keeps last valid value
# ============================

# ---------------------------
# SPEED OVER GROUND (knots)
# ---------------------------
- trigger:
    - platform: state
      entity_id:
        - sensor.signalk_navigation_speedOverGround
        - sensor.raw_sog
        - input_boolean.use_derived_data
  sensor:
    - name: "SOG"
      unique_id: "helper_sog"
      unit_of_measurement: "kn"
      state: >
        {% set use_dd = is_state('input_boolean.use_derived_data', 'on') %}
        {% set dd = trigger.to_state.state if trigger.entity_id == 'sensor.signalk_navigation_speedOverGround' else states('sensor.signalk_navigation_speedOverGround') %}
        {% set raw = trigger.to_state.state if trigger.entity_id == 'sensor.raw_sog' else states('sensor.raw_sog') %}
        {% set v = dd if (use_dd and dd not in ['unknown','unavailable','none','']) else raw %}
        {% if v not in ['unknown','unavailable','none',''] %}
          {{ (v | float * 1.94384) | round(2) }}
        {% else %}
          {{ this.state }}
        {% endif %}

