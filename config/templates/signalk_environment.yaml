# ============================
#   ENVIRONMENT HELPERS (Trigger-Based)
#   Keeps last valid value
# ============================

- trigger:
    - platform: state
      entity_id: sensor.signalk_depth
  sensor:
    - name: "Depth"
      unique_id: "helper_depth"
      unit_of_measurement: "m"
      state: >
        {% set v = trigger.to_state.state %}
        {% if v not in ['unknown','unavailable','none',''] %}
          {{ v | float | round(2) }}
        {% else %}
          {{ this.state }}
        {% endif %}

- trigger:
    - platform: state
      entity_id: sensor.signalk_wind_angle_apparent
  sensor:
    - name: "Wind Angle Apparent"
      unique_id: "helper_wind_angle_apparent"
      unit_of_measurement: "°"
      state: >
        {% set rad = trigger.to_state.state %}
        {% if rad not in ['unknown','unavailable','none',''] %}
          {{ ((rad | float) * 57.2958) | round(1) }}
        {% else %}
          {{ this.state }}
        {% endif %}

