reset_anchorage:
  alias: "Reset Anchorage to Slip"
  mode: single
  sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.anchorage_latitude
      data:
        value: "{{state_attr('device_tracker.your_tracker', 'latitude' }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.anchorage_longitude
      data:
        value: "{{state_attr('device_tracker.your_tracker', 'longitude' }}"
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.anchorage_set

set_anchorage_here:
  alias: "Set Anchorage to Current Location"
  mode: single
  sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.anchorage_latitude
      data:
        value: "{{ states('sensor.usb_latitude') }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.anchorage_longitude
      data:
        value: "{{ states('sensor.usb_longitude') }}"
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.anchorage_set
