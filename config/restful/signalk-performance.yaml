# ============================
#   SIGNAL K – PERFORMANCE
# ============================

# Velocity Made Good
- resource: !secret signalk_perf_vmg
  verify_ssl: false
  scan_interval: 5
  sensor:
    - name: "SignalK VMG"
      unique_id: "signalk_vmg"
      value_template: >
        {% if value_json is defined and value_json.value is defined %}
          {{ value_json.value }}
        {% else %}
          unavailable
        {% endif %}
      unit_of_measurement: "m/s"
