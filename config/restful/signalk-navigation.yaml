# ============================
#   SIGNAL K – NAVIGATION
# ============================
# ============================
# Signal K Navigation (RAW)
# ============================

# Position (Latitude & Longitude)
- resource: !secret signalk_nav_position
  headers:
    Authorization: !secret signalk_token
  scan_interval: 10
  sensor:
    - name: "SignalK Latitude"
      unique_id: "signalk_latitude"
      value_template: "{{ value_json.value.latitude | round(6) }}"
      unit_of_measurement: "deg"
    - name: "SignalK Longitude"
      unique_id: "signalk_longitude"
      value_template: "{{ value_json.value.longitude | round(6) }}"
      unit_of_measurement: "deg"

# COG True
- resource: !secret signalk_nav_cog_true
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Signalk COG True"
      unique_id: "signalk_cog_true"
      value_template: >
        {% if value_json is defined and value_json.value is defined %}
          {{ value_json.value }}
        {% else %}
          unavailable
        {% endif %}

