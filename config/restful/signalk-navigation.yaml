# ============================
#   SIGNAL K – NAVIGATION
# ============================
# ============================
# Signal K Navigation (RAW)
# ============================

# Position (Latitude & Longitude)
- resource: !secret signalk_nav_position
  headers:
    Authorization: !secret signalk_token
  scan_interval: 10
  sensor:
    - name: "SignalK Latitude"
      unique_id: "signalk_latitude"
      value_template: "{{ value_json.value.latitude | round(6) }}"
      unit_of_measurement: "deg"
    - name: "SignalK Longitude"
      unique_id: "signalk_longitude"
      value_template: "{{ value_json.value.longitude | round(6) }}"
      unit_of_measurement: "deg"

# COG True
- resource: !secret signalk_nav_cog_true
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw COG True"
      unique_id: "raw_cog_true"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "rad"

# COG Magnetic
- resource: !secret signalk_nav_cog_mag
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw COG Magnetic"
      unique_id: "raw_cog_mag"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "rad"

# Heading True
- resource: !secret signalk_nav_hdg_true
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw Heading True"
      unique_id: "raw_hdg_true"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "rad"

# Heading Magnetic
- resource: !secret signalk_nav_hdg_mag
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw Heading Magnetic"
      unique_id: "raw_hdg_mag"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "rad"

# ── SPEEDS — raw m/s, no conversion ───────────────────────────

# SOG
- resource: !secret signalk_nav_sog
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw SOG"
      unique_id: "raw_sog"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "m/s"

# STW
- resource: !secret signalk_nav_stw
  headers:
    Authorization: !secret signalk_token
  scan_interval: 5
  sensor:
    - name: "Raw STW"
      unique_id: "raw_stw"
      value_template: "{{ value_json.value | float }}"
      unit_of_measurement: "m/s"
