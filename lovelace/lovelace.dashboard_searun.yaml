config:
  badges:
  - color: info
    entity: input_button.anchorage_distance_button
    icon: mdi:map-marker-distance
    name: Distance
    show_icon: true
    show_name: true
    show_state: false
    type: entity
  - color: primary
    entity: input_button.anchorage_set_button
    icon: mdi:anchor
    name: Set
    show_icon: true
    show_name: true
    show_state: false
    type: entity
  - color: warning
    entity: input_button.anchorage_reset_button
    icon: mdi:anchor-remove
    name: Reset
    show_icon: true
    show_name: true
    show_state: false
    type: entity
  - entity: sensor.dummy_spacer
    show_icon: false
    show_name: false
    show_state: false
    style: "ha-card {\n  width: 40px;\n  box-shadow: none;\n  background: none;\n\
      }\n"
    type: entity
  - cards: []
    color: primary
    entity: input_boolean.show_bilge_camera
    header:
      badges_position: top
      badges_wrap: scroll
      layout: center
    icon: mdi:video-image
    name: Bilge
    show_icon: true
    show_name: true
    show_state: false
    type: entity
  - cards: []
    footer:
      card:
        entities:
        - entity: sensor.signalk_wind_angle_true_water
          icon: mdi:clock-outline
          name: Wind Angle True
          secondary_info: last-updated
        - entity: sensor.signalk_wind_angle_apparent
          icon: mdi:clock-outline
          name: Wind Angle Apparent
          secondary_info: last-updated
        - entity: sensor.signalk_wind_speed_true
          icon: mdi:clock-outline
          name: Wind Speed True
          secondary_info: last-updated
        - entity: sensor.signalk_wind_speed_apparent
          icon: mdi:clock-outline
          name: Wind Speed Apparent
          secondary_info: last-updated
        show_header_toggle: false
        state_color: true
        title: Last Updated
        type: entities
    icon: mdi:home
    max_columns: 4
    sections:
    - background:
        color: lime
        opacity: 50
      cards:
      - heading: Navigation
        type: heading
      - cards:
        - entity: sensor.sog
          max: 20
          min: 0
          name: SOG
          needle: true
          severity:
            green: 0
            red: 14
            yellow: 7
          type: gauge
          unit: kn
        - entity: sensor.stw
          max: 20
          min: 0
          name: STW
          needle: true
          severity:
            green: 0
            red: 14
            yellow: 7
          type: gauge
          unit: kn
        type: horizontal-stack
      - compass:
          north:
            show: true
        header:
          title:
            value: COG
        indicator_sensors:
        - indicator:
            image: arrow_outward
          sensor: sun.sun
        type: custom:compass-card
        value_sensors:
        - sensor: sensor.signalk_cog_true
      column_span: 1
      type: grid
    - background:
        color: amber
        opacity: 50
      cards:
      - heading: New section
        type: heading
      - cards:
        - entity: sensor.helper_cog_true
          max: 360
          min: 0
          name: COG True
          needle: true
          type: gauge
          unit: "\xB0"
        - entity: sensor.helper_cog_mag
          max: 360
          min: 0
          name: COG Mag
          needle: true
          type: gauge
          unit: "\xB0"
        type: horizontal-stack
      - cards:
        - entity: sensor.helper_hdg_true
          max: 360
          min: 0
          name: HDG True
          needle: true
          type: gauge
          unit: "\xB0"
        - entity: sensor.helper_hdg_mag
          max: 360
          min: 0
          name: HDG Mag
          needle: true
          type: gauge
          unit: "\xB0"
        type: horizontal-stack
      - entities:
        - entity: sensor.helper_cog_true
          icon: mdi:compass
          name: "COG \u2014 True"
          secondary_info: last-updated
        - entity: sensor.helper_cog_mag
          icon: mdi:compass-outline
          name: "COG \u2014 Magnetic"
          secondary_info: last-updated
        - entity: sensor.helper_hdg_true
          icon: mdi:ship-wheel
          name: "HDG \u2014 True"
          secondary_info: last-updated
        - entity: sensor.helper_hdg_mag
          icon: mdi:navigation-variant
          name: "HDG \u2014 Magnetic"
          secondary_info: last-updated
        show_header_toggle: false
        title: Course & Heading Detail
        type: entities
      column_span: 1
      type: grid
    - background:
        color: light-blue
        opacity: 50
      cards:
      - heading: New section
        type: heading
      - entities:
        - entity: input_boolean.use_derived_data
          icon: mdi:chart-timeline-variant-shimmer
          name: Use Derived / Calculated Data
          secondary_info: last-changed
        show_header_toggle: false
        title: Data Source
        type: entities
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **SOG unavailable** \u2014\
            \ verify GPS / NMEA 0183 source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_sog
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **STW unavailable** \u2014\
            \ verify Paddle Wheel source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_stw
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **COG unavailable** \u2014\
            \ verify GPS / NMEA 0183 source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_cog_true
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **HDG unavailable** \u2014\
            \ verify Digital Compass source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_hdg_true
          state: unavailable
        type: conditional
      column_span: 1
      type: grid
    title: Main
    type: sections
  - cards:
    - entities:
      - entity: sensor.esquimalt_warnings
      - entity: sensor.esquimalt_advisories
      - entity: sensor.esquimalt_barometric_pressure
        icon: mdi:gauge
        name: Air Pressure
      - entity: sensor.esquimalt_temperature
        name: Air Temperature
      - entity: sensor.esquimalt_humidity
        name: Humidity
      state_color: true
      title: Esquimalt Observations
      type: entities
    - cards:
      - entities:
        - entity: sensor.usb_latitude
          name: Latitude
        - entity: sensor.usb_longitude
          name: Longitude
        - entity: sensor.usb_sog_smoothed
          name: SOG (kn)
        - entity: sensor.usb_cog_smoothed
          name: "COG (\xB0)"
        - entity: sensor.usb_gps_age
          name: GPS Age (s)
        - entity: sensor.anchorage_distance
          name: Distance (m)
        - entity: sensor.anchorage_distance_nm
          name: Distance (nm)
        - entity: sensor.anchorage_bearing
          name: "Bearing (\xB0)"
        - entity: binary_sensor.in_anchorage_derived
          name: In Anchorage
        - entity: binary_sensor.anchorage_drift_alarm
          name: Drift Alarm
        title: Navigation
        type: entities
      type: vertical-stack
    - default_zoom: 16
      entities:
      - device_tracker.searun_pixel_4a
      - entity: device_tracker.vessel_position
        name: Vessel
      - entity: zone.anchorage
        name: Anchorage
      - entity: sensor.anchorage_distance
        name: Distance
      - entity: sensor.anchorage_bearing
        name: Bearing
      - entity: zone.pedder_bay_marina
        name: marina
      - entity: zone.pedder_bay_slip
        name: slip
      geo_location_sources:
      - all
      hours_to_show: 6
      theme_mode: auto
      type: map
    icon: mdi:weather-lightning-rainy
    path: environment
    title: Environment
    type: masonry
  - cards:
    - subtitle: Start & House Status
      title: Boat Batteries
      type: custom:mushroom-title-card
    - cards:
      - area: system
        color: '{% set s = states(''sensor.start_battery_state'') %} {% if s == ''charging''
          %} green {% elif s == ''resting'' %} blue {% elif s == ''discharging'' %}
          orange {% elif s == ''low'' %} yellow {% elif s == ''veryLow'' %} red {%
          elif s == ''disconnected'' %} grey {% else %} grey {% endif %}

          '
        entity: sensor.system_12v_battery_monitor_starting_battery_voltage
        features_position: bottom
        icon: mdi:car-battery
        primary: Start Battery
        secondary: "{% set v = states('sensor.system_12v_battery_monitor_starting_battery_voltage')\
          \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"%.2f\"\
          \ | format(v | float) }}\u202FV \u2014 {{ states('sensor.start_battery_state')\
          \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
        type: custom:mushroom-template-card
      - area: system
        color: '{% set s = states(''sensor.house_battery_state'') %} {% if s == ''charging''
          %} green {% elif s == ''resting'' %} blue {% elif s == ''discharging'' %}
          orange {% elif s == ''low'' %} yellow {% elif s == ''veryLow'' %} red {%
          elif s == ''disconnected'' %} grey {% else %} grey {% endif %}

          '
        entity: sensor.system_12v_battery_monitor_house_battery_voltage
        features_position: bottom
        icon: mdi:car-battery
        primary: House Battery
        secondary: "{% set v = states('sensor.system_12v_battery_monitor_house_battery_voltage')\
          \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"%.2f\"\
          \ | format(v | float) }}\u202FV \u2014 {{ states('sensor.house_battery_state')\
          \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
        type: custom:mushroom-template-card
      type: horizontal-stack
    - cards:
      - card:
          color: blue
          features_position: bottom
          icon: mdi:power-plug-off
          primary: Starting Battery is Not Charging
          secondary: Check alternator or charger
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.start_battery_state
          state_not: charging
        - condition: state
          entity: sensor.start_battery_state
          state_not: disconnected
        type: conditional
      - card:
          color: yellow
          features_position: bottom
          icon: mdi:key
          primary: Starting Battery is Low
          secondary: Start the engine while you can
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.start_battery_state
          state: low
        type: conditional
      - card:
          color: red
          features_position: bottom
          icon: mdi:battery-10
          primary: Starting Battery Very Low
          secondary: Start engine immediately
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.start_battery_state
          state: veryLow
        type: conditional
      - card:
          color: grey
          features_position: bottom
          icon: mdi:not-equal-variant
          primary: No Start Battery!
          secondary: Check connections
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.start_battery_state
          state: disconnected
        type: conditional
      - card:
          color: blue
          features_position: bottom
          icon: mdi:power-plug-off
          primary: House Battery is Not Charging
          secondary: Check charger or solar input
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.house_battery_state
          state_not: charging
        - condition: state
          entity: sensor.house_battery_state
          state_not: disconnected
        type: conditional
      - card:
          color: yellow
          features_position: bottom
          icon: mdi:battery-30
          primary: House Battery Running Low
          secondary: Reduce instrument usage
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.house_battery_state
          state: low
        type: conditional
      - card:
          color: red
          features_position: bottom
          icon: mdi:battery-10
          primary: House Battery Very Low
          secondary: Turn off instruments
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.house_battery_state
          state: veryLow
        type: conditional
      - card:
          color: grey
          features_position: bottom
          icon: mdi:not-equal-variant
          primary: No House Battery!
          secondary: Check connections
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.house_battery_state
          state: disconnected
        type: conditional
      title: Messages
      type: vertical-stack
    icon: mdi:car-battery
    path: test
    title: test
    type: masonry
  - cards:
    - cards:
      - title: Pump System Status
        type: custom:mushroom-title-card
      - cards:
        - color: '{{ ''green'' if is_state(''binary_sensor.system_pump_switch_sensor_pump_1_on'',''on'')
            else ''grey'' }}

            '
          features_position: bottom
          icon: mdi:pump
          multiline_secondary: true
          primary: Pump 1
          secondary: 'Cycles: {{ states(''sensor.system_pump_switch_sensor_pump_1_cycles'')
            }}

            Today: {{ states(''sensor.pump_1_on_time_today'') }} h

            Week: {{ states(''sensor.pump_1_on_time_this_week'') }} h

            Month: {{ states(''sensor.pump_1_on_time_this_month'') }} h

            '
          type: custom:mushroom-template-card
        - color: '{{ ''green'' if is_state(''binary_sensor.system_pump_switch_sensor_pump_2_on'',''on'')
            else ''grey'' }}

            '
          features_position: bottom
          icon: mdi:pump
          multiline_secondary: true
          primary: Pump 2
          secondary: 'Cycles: {{ states(''sensor.system_pump_switch_sensor_pump_2_cycles'')
            }}   Today: {{ states(''sensor.pump_2_on_time_today'') }} h   Week: {{
            states(''sensor.pump_2_on_time_this_week'') }} h   Month: {{ states(''sensor.pump_2_on_time_this_month'')
            }} h

            '
          type: custom:mushroom-template-card
        - color: '{{ ''green'' if is_state(''binary_sensor.system_pump_switch_sensor_pump_3_on'',''on'')
            else ''grey'' }}

            '
          features_position: bottom
          icon: mdi:pump
          multiline_secondary: true
          primary: Pump 3
          secondary: 'Cycles: {{ states(''sensor.system_pump_switch_sensor_pump_3_cycles'')
            }}   Today: {{ states(''sensor.pump_3_on_time_today'') }} h   Week: {{
            states(''sensor.pump_3_on_time_this_week'') }} h   Month: {{ states(''sensor.pump_3_on_time_this_month'')
            }} h

            '
          type: custom:mushroom-template-card
        type: horizontal-stack
      - tabs:
        - attributes:
            icon: mdi:pump
            label: Pump 1
          card:
            apex_config:
              yaxis:
              - decimalsInFloat: 0
                id: '0'
                max: 1
                min: 0
                title:
                  text: On/Off
              - id: '1'
                opposite: true
                title:
                  text: Total Runtime (s)
            graph_span: 24h
            header:
              title: "Pump 1 \u2014 On/Off + Runtime"
            now:
              show: true
            series:
            - color: green
              entity: binary_sensor.system_pump_switch_sensor_pump_1_on
              name: Pump 1 On/Off
              opacity: 0.4
              stroke_width: 2
              transform: 'return x === ''on'' ? 1 : 0;'
              type: area
              yaxis_id: '0'
            - color: blue
              entity: sensor.system_pump_switch_sensor_pump_1_total_on_time
              name: Pump 1 Total Runtime
              stroke_width: 3
              type: line
              yaxis_id: '1'
            span:
              start: day
            style: "ha-card {\n  height: 400px;\n}\n"
            type: custom:apexcharts-card
        - attributes:
            icon: mdi:pump
            label: Pump 2
          card:
            apex_config:
              yaxis:
              - decimalsInFloat: 0
                id: '0'
                max: 1
                min: 0
                title:
                  text: On/Off
              - id: '1'
                opposite: true
                title:
                  text: Total Runtime (s)
            graph_span: 24h
            header:
              title: "Pump 2 \u2014 On/Off + Runtime"
            now:
              show: true
            series:
            - color: green
              entity: binary_sensor.system_pump_switch_sensor_pump_2_on
              name: Pump 2 On/Off
              opacity: 0.4
              stroke_width: 2
              transform: 'return x === ''on'' ? 1 : 0;'
              type: area
              yaxis_id: '0'
            - color: blue
              entity: sensor.system_pump_switch_sensor_pump_2_total_on_time
              name: Pump 2 Total Runtime
              stroke_width: 3
              type: line
              yaxis_id: '1'
            span:
              start: day
            style: "ha-card {\n  height: 400px;\n}\n"
            type: custom:apexcharts-card
        - attributes:
            icon: mdi:pump
            label: Pump 3
          card:
            apex_config:
              yaxis:
              - decimalsInFloat: 0
                id: '0'
                max: 1
                min: 0
                title:
                  text: On/Off
              - id: '1'
                opposite: true
                title:
                  text: Total Runtime (s)
            graph_span: 24h
            header:
              title: "Pump 3 \u2014 On/Off + Runtime"
            now:
              show: true
            series:
            - color: green
              entity: binary_sensor.system_pump_switch_sensor_pump_3_on
              name: Pump 3 On/Off
              opacity: 0.4
              stroke_width: 2
              transform: 'return x === ''on'' ? 1 : 0;'
              type: area
              yaxis_id: '0'
            - color: blue
              entity: sensor.system_pump_switch_sensor_pump_3_total_on_time
              name: Pump 3 Total Runtime
              stroke_width: 3
              type: line
              yaxis_id: '1'
            span:
              start: day
            style: "ha-card {\n  height: 400px;\n}\n"
            type: custom:apexcharts-card
        type: custom:tabbed-card
      type: vertical-stack
    icon: mdi:water-pump
    title: Pump Status
    type: masonry
  - cards:
    - title: System Logs
      type: iframe
      url: /config/logs
    icon: mdi:math-log
    path: logs
    title: logs
    type: panel
  views:
  - cards: []
    icon: mdi:shield-home-outline
    max_columns: 4
    sections:
    - cards:
      - heading: null
        type: heading
      - cards:
        - card:
            card_mod:
              style: "ha-card {\n  background-color: #c6f6c6;   /* pastel green */\n\
                \  color: #004d00;              /* dark green text */\n  border-radius:\
                \ 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
            entity: script.set_anchorage_here
            icon: mdi:anchor
            name: Drop
            show_state: false
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.set_anchorage_here
            type: button
          conditions:
          - condition: state
            entity: input_boolean.anchorage_set
            state: 'on'
          type: conditional
        - card:
            card_mod:
              style: "ha-card {\n  background-color: #ffcccc;   /* pastel red */\n\
                \  color: #660000;              /* dark red text */\n  border-radius:\
                \ 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
            entity: script.reset_anchorage
            icon: mdi:anchor
            name: Weigh
            show_state: false
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.reset_anchorage
            type: button
          conditions:
          - condition: state
            entity: input_boolean.anchorage_set
            state: 'on'
          type: conditional
        - card_mod:
            style: "ha-card {\n  background-color: #b3d9ff;   /* pastel blue */\n\
              \  color: #003366;              /* dark navy text */\n  border-radius:\
              \ 8px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
          entity: sensor.anchorage_distance
          icon: mdi:map-marker-distance
          name: Distance
          show_state: true
          tap_action:
            action: none
          type: button
        - card_mod:
            style: "ha-card {\n  background-color: #ffe6b3;   /* pastel amber */\n\
              \  color: #663d00;              /* dark amber text */\n  border-radius:\
              \ 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
          entity: input_boolean.show_bilge_camera
          icon: mdi:video-outline
          name: Bilge
          show_state: false
          tap_action:
            action: toggle
          type: button
        - card_mod:
            style: "ha-card {\n  background-color: #ffe6b3;   /* pastel amber */\n\
              \  color: #663d00;              /* dark amber text */\n  border-radius:\
              \ 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
          entity: input_boolean.show_deck_camera
          icon: mdi:video-outline
          name: Deck
          show_state: false
          tap_action:
            action: toggle
          type: button
        type: horizontal-stack
      - card:
          card_mod:
            style: "ha-card {\n  width: 100%;\n  animation: flash 1s infinite;\n \
              \ background-color: red !important;\n  color: white !important;\n  text-align:\
              \ center;\n  font-size: 1.6rem;\n  font-weight: bold;\n  padding: 20px;\n\
              \  border: 4px solid white;\n  border-radius: 12px;\n}\n\n@keyframes\
              \ flash {\n  0%   { opacity: 1; }\n  50%  { opacity: 0.4; }\n  100%\
              \ { opacity: 1; }\n}\n"
          icon: mdi:water-alert
          icon_color: red
          primary: "\u26A0\uFE0F HIGH WATER IN BILGE \u26A0\uFE0F"
          secondary: Immediate attention required
          type: custom:mushroom-template-card
        conditions:
        - entity: binary_sensor.sonoff_snzb_05p
          state: 'on'
        type: conditional
      - cards:
        - cards:
          - card_mod:
              style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_1_on','on')\
                \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
            color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_1_on'',''on'')
              %} {{ ''amber'' if on else ''gray'' }}

              '
            features_position: bottom
            icon: mdi:water-pump
            primary: Pump 1
            secondary: "{{ states('sensor.system_pump_switch_sensor_pump_1_cycles')\
              \ | int }} - \u21BB\n"
            type: custom:mushroom-template-card
          - card:
              card_mod:
                style: "ha-card {\n  background-color: color-mix(in srgb, orange 20%,\
                  \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n}\n"
              features_position: bottom
              multiline_secondary: true
              secondary: '{% set today = states(''sensor.pump_1_on_time_today'') |
                float(0) %}

                {% set week = states(''sensor.pump_1_on_time_this_week'') | float(0)
                %}

                {% set today_h = (today * 60) // 60 %}

                {% set today_m = (today * 60) % 60 %}

                {% set week_h = (week * 60) // 60 %}

                {% set week_m = (week * 60) % 60 %}

                Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                }} h

                Week : {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                h

                '
              type: custom:mushroom-template-card
            conditions:
            - condition: state
              entity: binary_sensor.pump_1_high_runtime
              state: 'on'
            type: conditional
          type: vertical-stack
        - cards:
