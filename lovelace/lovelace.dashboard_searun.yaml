config:
  views:
  - cards: []
    footer:
      card:
        entities:
        - entity: sensor.signalk_wind_angle_true_water
          icon: mdi:clock-outline
          name: Wind Angle True
          secondary_info: last-updated
        - entity: sensor.signalk_wind_angle_apparent
          icon: mdi:clock-outline
          name: Wind Angle Apparent
          secondary_info: last-updated
        - entity: sensor.signalk_wind_speed_true
          icon: mdi:clock-outline
          name: Wind Speed True
          secondary_info: last-updated
        - entity: sensor.signalk_wind_speed_apparent
          icon: mdi:clock-outline
          name: Wind Speed Apparent
          secondary_info: last-updated
        show_header_toggle: false
        state_color: true
        title: Last Updated
        type: entities
    icon: mdi:home
    max_columns: 4
    sections:
    - background:
        color: lime
        opacity: 50
      cards:
      - heading: Navigation
        type: heading
      - cards:
        - entity: sensor.sog
          max: 20
          min: 0
          name: SOG
          needle: true
          severity:
            green: 0
            red: 14
            yellow: 7
          type: gauge
          unit: kn
        - entity: sensor.stw
          max: 20
          min: 0
          name: STW
          needle: true
          severity:
            green: 0
            red: 14
            yellow: 7
          type: gauge
          unit: kn
        type: horizontal-stack
      - compass:
          north:
            show: true
        header:
          title:
            value: COG
        indicator_sensors:
        - indicator:
            image: arrow_outward
          sensor: sun.sun
        type: custom:compass-card
        value_sensors:
        - sensor: sensor.signalk_cog_true
      column_span: 1
      type: grid
    - background:
        color: amber
        opacity: 50
      cards:
      - heading: New section
        type: heading
      - cards:
        - entity: sensor.helper_cog_true
          max: 360
          min: 0
          name: COG True
          needle: true
          type: gauge
          unit: "\xB0"
        - entity: sensor.helper_cog_mag
          max: 360
          min: 0
          name: COG Mag
          needle: true
          type: gauge
          unit: "\xB0"
        type: horizontal-stack
      - cards:
        - entity: sensor.helper_hdg_true
          max: 360
          min: 0
          name: HDG True
          needle: true
          type: gauge
          unit: "\xB0"
        - entity: sensor.helper_hdg_mag
          max: 360
          min: 0
          name: HDG Mag
          needle: true
          type: gauge
          unit: "\xB0"
        type: horizontal-stack
      - entities:
        - entity: sensor.helper_cog_true
          icon: mdi:compass
          name: "COG \u2014 True"
          secondary_info: last-updated
        - entity: sensor.helper_cog_mag
          icon: mdi:compass-outline
          name: "COG \u2014 Magnetic"
          secondary_info: last-updated
        - entity: sensor.helper_hdg_true
          icon: mdi:ship-wheel
          name: "HDG \u2014 True"
          secondary_info: last-updated
        - entity: sensor.helper_hdg_mag
          icon: mdi:navigation-variant
          name: "HDG \u2014 Magnetic"
          secondary_info: last-updated
        show_header_toggle: false
        title: Course & Heading Detail
        type: entities
      column_span: 1
      type: grid
    - background:
        color: light-blue
        opacity: 50
      cards:
      - heading: New section
        type: heading
      - entities:
        - entity: input_boolean.use_derived_data
          icon: mdi:chart-timeline-variant-shimmer
          name: Use Derived / Calculated Data
          secondary_info: last-changed
        show_header_toggle: false
        title: Data Source
        type: entities
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **SOG unavailable** \u2014\
            \ verify GPS / NMEA 0183 source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_sog
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **STW unavailable** \u2014\
            \ verify Paddle Wheel source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_stw
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **COG unavailable** \u2014\
            \ verify GPS / NMEA 0183 source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_cog_true
          state: unavailable
        type: conditional
      - card:
          content: "<ha-alert alert-type=\"warning\">\n  **HDG unavailable** \u2014\
            \ verify Digital Compass source\n</ha-alert>\n"
          type: markdown
        conditions:
        - condition: state
          entity: sensor.helper_hdg_true
          state: unavailable
        type: conditional
      column_span: 1
      type: grid
    title: Main
    type: sections
  - cards: []
    icon: mdi:view-dashboard-variant
    max_columns: 4
    path: system
    sections:
    - cards:
      - cards:
        - card:
            card_mod:
              style: "ha-card {\n  width: 100%;\n  animation: flash 1s infinite;\n\
                \  background-color: red !important;\n  color: white !important;\n\
                \  text-align: center;\n  font-size: 1.6rem;\n  font-weight: bold;\n\
                \  padding: 20px;\n  border: 4px solid white;\n  border-radius: 12px;\n\
                }\n\n@keyframes flash {\n  0%   { opacity: 1; }\n  50%  { opacity:\
                \ 0.4; }\n  100% { opacity: 1; }\n}\n"
            icon: mdi:water-alert
            icon_color: red
            primary: "\u26A0\uFE0F HIGH WATER IN BILGE \u26A0\uFE0F"
            secondary: Immediate attention required
            type: custom:mushroom-template-card
          conditions:
          - entity: binary_sensor.sonoff_snzb_05p
            state: 'on'
          type: conditional
        - title: Pumps
          type: custom:mushroom-title-card
        - cards:
          - cards:
            - card_mod:
                style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_1_on','on')\
                  \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                  \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                  \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
              color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_1_on'',''on'')
                %} {{ ''amber'' if on else ''gray'' }}

                '
              features_position: bottom
              icon: mdi:water-pump
              primary: Pump 1
              secondary: '{{ states(''sensor.system_pump_switch_sensor_pump_1_cycles'')
                | int }} - cycles

                '
              type: custom:mushroom-template-card
            - card:
                card_mod:
                  style: "ha-card {\n  background-color: color-mix(in srgb, red 10%,\
                    \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n\
                    }\n"
                features_position: bottom
                multiline_secondary: true
                secondary: '{% set today = states(''sensor.pump_1_on_time_today'')
                  | float(0) %}

                  {% set week = states(''sensor.pump_1_on_time_this_week'') | float(0)
                  %}

                  {% set today_h = (today * 60) // 60 %}

                  {% set today_m = (today * 60) % 60 %}

                  {% set week_h = (week * 60) // 60 %}

                  {% set week_m = (week * 60) % 60 %}

                  Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                  }} h

                  Week: {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                  h

                  '
                type: custom:mushroom-template-card
              conditions:
              - condition: state
                entity: binary_sensor.pump_1_high_runtime
                state: 'on'
              type: conditional
            type: vertical-stack
          - cards:
            - card_mod:
                style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_2_on','on')\
                  \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                  \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                  \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
              color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_2_on'',''on'')
                %} {{ ''amber'' if on else ''gray'' }}

                '
              features_position: bottom
              icon: mdi:water-pump
              primary: Pump 2
              secondary: '{{ states(''sensor.system_pump_switch_sensor_pump_2_cycles'')
                | int }} - cycles

                '
              type: custom:mushroom-template-card
            - card:
                card_mod:
                  style: "ha-card {\n  background-color: color-mix(in srgb, red 10%,\
                    \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n\
                    }\n"
                features_position: bottom
                multiline_secondary: true
                secondary: '{% set today = states(''sensor.pump_2_on_time_today'')
                  | float(0) %}

                  {% set week = states(''sensor.pump_2_on_time_this_week'') | float(0)
                  %}

                  {% set today_h = (today * 60) // 60 %}

                  {% set today_m = (today * 60) % 60 %}

                  {% set week_h = (week * 60) // 60 %}

                  {% set week_m = (week * 60) % 60 %}

                  Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                  }} h

                  Week: {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                  h

                  '
                type: custom:mushroom-template-card
              conditions:
              - condition: state
                entity: binary_sensor.pump_2_high_runtime
                state: 'on'
              type: conditional
            type: vertical-stack
          - cards:
            - card_mod:
                style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_3_on','on')\
                  \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                  \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                  \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
              color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_3_on'',''on'')
                %} {{ ''amber'' if on else ''gray'' }}

                '
              features_position: bottom
              icon: mdi:water-pump
              primary: Pump 3
              secondary: '{{ states(''sensor.system_pump_switch_sensor_pump_3_cycles'')
                | int }} ~

                '
              type: custom:mushroom-template-card
            - card:
                card_mod:
                  style: "ha-card {\n  background-color: color-mix(in srgb, red 10%,\
                    \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n\
                    }\n"
                features_position: bottom
                multiline_secondary: true
                secondary: '{% set today = states(''sensor.pump_3_on_time_today'')
                  | float(0) %}

                  {% set week = states(''sensor.pump_3_on_time_this_week'') | float(0)
                  %}

                  {% set today_h = (today * 60) // 60 %}

                  {% set today_m = (today * 60) % 60 %}

                  {% set week_h = (week * 60) // 60 %}

                  {% set week_m = (week * 60) % 60 %}

                  Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                  }} h

                  Week: {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                  h

                  '
                type: custom:mushroom-template-card
              conditions:
              - condition: state
                entity: binary_sensor.pump_3_high_runtime
                state: 'on'
              type: conditional
            type: vertical-stack
          type: horizontal-stack
        - title: Batteries
          type: custom:mushroom-title-card
        - cards:
          - area: system
            card_mod:
              style: "ha-card {\n  --c: {% set s = states('sensor.start_battery_state')\
                \ %}\n    {% if s == 'charging' %} green\n    {% elif s == 'resting'\
                \ %} blue\n    {% elif s == 'discharging' %} orange\n    {% elif s\
                \ == 'low' %} yellow\n    {% elif s == 'veryLow' %} red\n    {% elif\
                \ s == 'disconnected' %} grey\n    {% else %} grey\n    {% endif %};\n\
                \  border: 3px solid var(--c);\n  background-color: color-mix(in srgb,\
                \ var(--c) 10%, transparent);              border-radius: 12px;\n\
                \  border-radius: 8px;\n  padding: 0px 1px;\n}\n"
            entity: sensor.system_12v_battery_monitor_starting_battery_voltage
            features_position: bottom
            icon: mdi:car-battery
            icon_color: '{% set s = states(''sensor.start_battery_state'') %} {% if
              s == ''charging'' %} green {% elif s == ''resting'' %} blue {% elif
              s == ''discharging'' %} orange {% elif s == ''low'' %} yellow {% elif
              s == ''veryLow'' %} red {% elif s == ''disconnected'' %} grey {% else
              %} grey {% endif %}

              '
            primary: Start Battery
            secondary: "{% set v = states('sensor.system_12v_battery_monitor_starting_battery_voltage')\
              \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"\
              %.2f\" | format(v | float) }}\u202FV \u2014 {{ states('sensor.start_battery_state')\
              \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
            type: custom:mushroom-template-card
          - area: system
            card_mod:
              style: "ha-card {\n  --c: {% set s = states('sensor.house_battery_state')\
                \ %}\n    {% if s == 'charging' %} green\n    {% elif s == 'resting'\
                \ %} blue\n    {% elif s == 'discharging' %} orange\n    {% elif s\
                \ == 'low' %} yellow\n    {% elif s == 'veryLow' %} red\n    {% elif\
                \ s == 'disconnected' %} grey\n    {% else %} grey\n    {% endif %};\n\
                \  border: 3px solid var(--c);\n  background-color: color-mix(in srgb,\
                \ var(--c) 10%, transparent);\n  border-radius: 8px;\n  padding: 0px\
                \ 1px;\n\n}\n"
            entity: sensor.system_12v_battery_monitor_house_battery_voltage
            features_position: bottom
            icon: mdi:car-battery
            icon_color: '{% set s = states(''sensor.house_battery_state'') %} {% if
              s == ''charging'' %} green {% elif s == ''resting'' %} blue {% elif
              s == ''discharging'' %} orange {% elif s == ''low'' %} yellow {% elif
              s == ''veryLow'' %} red {% elif s == ''disconnected'' %} grey {% else
              %} grey {% endif %}

              '
            primary: House Battery
            secondary: "{% set v = states('sensor.system_12v_battery_monitor_house_battery_voltage')\
              \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"\
              %.2f\" | format(v | float) }}\u202FV \u2014 {{ states('sensor.house_battery_state')\
              \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
            type: custom:mushroom-template-card
          type: horizontal-stack
        - title: Cabin
          type: custom:mushroom-title-card
        - cards:
          - card_mod:
              style: "ha-card {\n  {% set s = states('binary_sensor.cabin_hatch')\
                \ %}\n  {% set t = states('binary_sensor.cabin_hatch_tamper') %}\n\
                \  {% if t == 'on' %}\n    --c: red;\n  {% elif s == 'off' %}\n  \
                \  --c: green;\n  {% elif s == 'on' %}\n    --c: orange;\n  {% else\
                \ %}\n    --c: gray;\n  {% endif %}\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 1px;\n}\n"
            color: "{% set s = states('binary_sensor.cabin_hatch') %} {% set t = states('binary_sensor.cabin_hatch_tamper')\
              \ %} {% if t == 'on' %}\n  orange\n{% elif s == 'off' %}\n  green\n\
              {% elif s == 'on' %}\n  amber\n{% else %}\n  amber\n{% endif %}\n"
            features_position: bottom
            icon: "{% set s = states('binary_sensor.cabin_hatch') %} {% set t = states('binary_sensor.cabin_hatch_tamper')\
              \ %} {% if t == 'on' %}\n  mdi:window-shutter-alert\n{% elif s == 'off'\
              \ %}\n  mdi:window-shutter\n{% elif s == 'on' %}\n  mdi:window-shutter-open\n\
              {% else %}\n  mdi:alert\n{% endif %}\n"
            primary: Hatch
            secondary: "{% set s = states('binary_sensor.cabin_hatch') %} {% set t\
              \ = states('binary_sensor.cabin_hatch_tamper') %} {% if t == 'on' %}\n\
              \  Tampered\n{% elif s == 'off' %}\n  Closed\n{% elif s == 'on' %}\n\
              \  Open\n{% else %}\n  Error\n{% endif %}\n"
            type: custom:mushroom-template-card
          - card_mod:
              style: "ha-card {\n  {% set t = states('sensor.cabin_temperature_f2')\
                \ | float(0) %}\n  {% if t < 33 %}\n    background-color: color-mix(in\
                \ srgb, lightblue 20%, transparent);\n    border: 3px solid lightblue;\n\
                \  {% elif t < 37 %}\n    background-color: color-mix(in srgb, blue\
                \ 20%, transparent);\n    border: 3px solid blue;\n  {% elif t > 85\
                \ %}\n    background-color: color-mix(in srgb, gold 20%, transparent);\n\
                \    border: 3px solid gold;\n  {% elif t > 95 %}\n    background-color:\
                \ color-mix(in srgb, red 20%, transparent);\n    border: 3px solid\
                \ red;\n  {% else %}\n    background-color: color-mix(in srgb, green\
                \ 10%, transparent);\n    border: 3px solid green;\n  {% endif %}\n\
                \  border-radius: 8px;\n  padding: 0px 1px;\n}\n"
            color: "{% set t = states('sensor.cabin_temperature_f2') | float(0) %}\
              \ {% if t < 33 %}\n  blue\n{% elif t < 37 %}\n  blue\n{% elif t > 85\
              \ %}\n  amber\n{% elif t > 95 %}\n  red\n{% else %}\n  green\n{% endif\
              \ %}\n"
            features_position: bottom
            icon: mdi:thermometer
            primary: Temp
            secondary: "{% set t = states('sensor.cabin_temperature_f2') | float(0)\
              \ %} {{ t }} \xB0F\n"
            type: custom:mushroom-template-card
          - card_mod:
              style: "ha-card {\n  {% set h = states('sensor.cabin_humidity') | float(0)\
                \ %}\n  {% if h < 40 %}\n    --c: lightblue;\n  {% elif h < 60 %}\n\
                \    --c: green;\n  {% elif h < 75 %}\n    --c: gold;\n  {% else %}\n\
                \    --c: red;\n  {% endif %}\n  border: 3px solid var(--c);\n  background-color:\
                \ color-mix(in srgb, var(--c) 10%, transparent);\n  border-radius:\
                \ 8px;\n  padding: 0px 1px;\n}\n"
            color: "{% set h = states('sensor.cabin_humidity') | float(0) %} {% if\
              \ h < 40 %}\n  blue\n{% elif h < 60 %}\n  green\n{% elif h < 75 %}\n\
              \  amber\n{% else %}\n  red\n{% endif %}\n"
            features_position: bottom
            icon: mdi:water-percent
            primary: Humidity
            secondary: "{% set h = states('sensor.cabin_humidity') | float(0) %} {%\
              \ set t = states('sensor.cabin_temperature_f2') | float(0) %} {% set\
              \ tc = (t - 32) * 5/9 %} {% set a = 17.62 %} {% set b = 243.12 %} {%\
              \ set gamma = (a * tc / (b + tc)) + (h/100) | log %} {% set dp_c = (b\
              \ * gamma) / (a - gamma) %} {% set dp_f = (dp_c * 9/5) + 32 %} {{ h\
              \ | round(0) }}% \U0001F4A7 {{ dp_f | round(0) }}\xB0F\n"
            type: custom:mushroom-template-card
          - card_mod:
              style: "ha-card {\n  --c: {% if is_state('binary_sensor.cabin_motion','on')\
                \ %} gold {% else %} grey {% endif %};\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 1px;\n}\n"
            color: "{% if is_state('binary_sensor.cabin_motion','off') %}\n  grey\n\
              {% else %}\n  amber\n{% endif %}\n"
            features_position: bottom
            icon: mdi:motion-sensor
            primary: Motion
            secondary: "{% if is_state('binary_sensor.cabin_motion','on') %}\n  Motion\
              \ Detected\n{% else %}\n  No Motion\n{% endif %}\n"
            type: custom:mushroom-template-card
          columns: 4
          square: false
          type: grid
        type: vertical-stack
      type: grid
    title: System
    type: sections
  - cards:
    - entities:
      - entity: sensor.esquimalt_warnings
      - entity: sensor.esquimalt_advisories
      - entity: sensor.esquimalt_barometric_pressure
        icon: mdi:gauge
        name: Air Pressure
      - entity: sensor.esquimalt_temperature
        name: Air Temperature
      - entity: sensor.esquimalt_humidity
        name: Humidity
      state_color: true
      title: Esquimalt Observations
      type: entities
    icon: mdi:weather-lightning-rainy
    path: environment
    title: Environment
    type: masonry
  - icon: mdi:clipboard
    max_columns: 4
    path: work-sheet
    sections:
    - cards: []
      type: grid
    title: Work Sheet
    type: sections
  - icon: mdi:compass-rose
    max_columns: 4
    path: navigational
    sections:
    - cards: []
      type: grid
    title: Navigational
    type: sections
  - cards:
    - subtitle: Start & House Status
      title: Boat Batteries
      type: custom:mushroom-title-card
    - cards:
      - area: system
        color: '{% set s = states(''sensor.start_battery_state'') %} {% if s == ''charging''
          %} green {% elif s == ''resting'' %} blue {% elif s == ''discharging'' %}
          orange {% elif s == ''low'' %} yellow {% elif s == ''veryLow'' %} red {%
          elif s == ''disconnected'' %} grey {% else %} grey {% endif %}

          '
        entity: sensor.system_12v_battery_monitor_starting_battery_voltage
        features_position: bottom
        icon: mdi:car-battery
        primary: Start Battery
        secondary: "{% set v = states('sensor.system_12v_battery_monitor_starting_battery_voltage')\
          \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"%.2f\"\
          \ | format(v | float) }}\u202FV \u2014 {{ states('sensor.start_battery_state')\
          \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
        type: custom:mushroom-template-card
      - area: system
        color: '{% set s = states(''sensor.house_battery_state'') %} {% if s == ''charging''
          %} green {% elif s == ''resting'' %} blue {% elif s == ''discharging'' %}
          orange {% elif s == ''low'' %} yellow {% elif s == ''veryLow'' %} red {%
          elif s == ''disconnected'' %} grey {% else %} grey {% endif %}

          '
        entity: sensor.system_12v_battery_monitor_house_battery_voltage
        features_position: bottom
        icon: mdi:car-battery
        primary: House Battery
        secondary: "{% set v = states('sensor.system_12v_battery_monitor_house_battery_voltage')\
          \ %} {% if v not in ['unknown','unavailable','none',''] %}\n  {{ \"%.2f\"\
          \ | format(v | float) }}\u202FV \u2014 {{ states('sensor.house_battery_state')\
          \ | title }}\n{% else %}\n  --\u202FV \u2014 Unknown\n{% endif %}\n"
        type: custom:mushroom-template-card
      type: horizontal-stack
    - cards:
      - card:
          color: blue
          features_position: bottom
          icon: mdi:power-plug-off
          primary: Starting Battery is Not Charging
          secondary: Check alternator or charger
          type: custom:mushroom-template-card
        conditions:
        - condition: state
          entity: sensor.start_battery_state
          state_not: charging
        - condition: state
          entity: sensor.start_battery_state
          state_not: disconnected
        type: conditional
      - card:
          color: yellow
