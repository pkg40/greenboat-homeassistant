config:
  views:
  - cards: []
    icon: mdi:shield-home-outline
    max_columns: 4
    path: temporary
    sections:
    - cards:
      - heading: null
        type: heading
      - cards:
        - card_mod:
            style: "ha-card {\n  {% set d = states('sensor.berth_distance') | float(0)\
              \ %}\n  {% set r = state_attr('zone.pedder_bay_slip','radius') | float(0)\
              \ %}\n  {% if d <= r %}\n    --c: #4a90e2;  # same hue as deck camera\n\
              \  {% elif d > r and d < 1000 %}\n    --c: #ffe6b3;\n  {% else %}\n\
              \    --c: #ffcccc;\n  {% endif %}\n  background-color: color-mix(in\
              \ srgb, var(--c) 20%, transparent);\n  border: 3px solid var(--c);\n\
              \  border-radius: 8px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
          icon: mdi:map-marker-distance
          icon_color: "{% set d = states('sensor.berth_distance') | float(0) %} {%\
            \ set r = state_attr('zone.pedder_bay_slip','radius') | float(0) %} {%\
            \ if d <= r %}\n  blue\n{% elif d < 1000 %}\n  amber\n{% else %}\n  red\n\
            {% endif %}\n"
          primary: Slip
          secondary: "{% set d = states('sensor.berth_distance') | float(0) %} {%\
            \ if d < 1000 %}\n  {{ d | round(0) }}\u202Fm\n{% else %}\n  {{ (d / 1000)\
            \ | round(2) }}\u202Fkm\n{% endif %}\n"
          type: custom:mushroom-template-card
        - card:
            card_mod:
              style: "ha-card {\n  background-color: #c6f6c6;\n  color: #004d00;\n\
                \  border-radius: 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
            entity: script.set_anchorage_here
            icon: mdi:anchor
            name: Drop
            show_state: false
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.set_anchorage_here
            type: button
          conditions:
          - condition: state
            entity: input_boolean.anchorage_set
            state: 'off'
          type: conditional
        - card:
            card_mod:
              style: "ha-card {\n  background-color: #ffcccc;\n  color: #660000;\n\
                \  border-radius: 12px;\n  padding: 8px;\n  font-weight: 600;\n}\n"
            entity: script.reset_anchorage
            icon: mdi:anchor
            name: Weigh
            show_state: false
            tap_action:
              action: call-service
              service: script.turn_on
              target:
                entity_id: script.reset_anchorage
            type: button
          conditions:
          - condition: state
            entity: input_boolean.anchorage_set
            state: 'on'
          type: conditional
        - card_mod:
            style: "ha-card {\n  {% set d = states('sensor.anchorage_distance') |\
              \ float(0) %}\n  {% set r = states('input_number.anchorage_radius')\
              \ | float(0) %}\n  {% if d <= r %}\n    --c: #4a90e2;  # same hue as\
              \ deck camera\n  {% elif d > r and d < 1000 %}\n    --c: #ffe6b3;\n\
              \  {% else %}\n    --c: #ffcccc;\n  {% endif %}\n  background-color:\
              \ color-mix(in srgb, var(--c) 20%, transparent);\n  border: 3px solid\
              \ var(--c);\n  border-radius: 8px;\n  padding: 8px;\n  font-weight:\
              \ 600;\n}\n"
          icon: mdi:map-marker-distance
          icon_color: "{% set d = states('sensor.anchorage_distance') | float(0) %}\
            \ {% set r = states('input_number.anchorage_radius') | float(0) %} {%\
            \ if d <= r %}\n  blue\n{% elif d < 1000 %}\n  amber\n{% else %}\n  red\n\
            {% endif %}\n"
          primary: Anchorage
          secondary: "{% set d = states('sensor.anchorage_distance') | float(0) %}\
            \ {% if d < 1000 %}\n  {{ d | round(0) }}\u202Fm\n{% else %}\n  {{ (d\
            \ / 1000) | round(2) }}\u202Fkm\n{% endif %}\n"
          type: custom:mushroom-template-card
        type: horizontal-stack
      - card:
          card:
            cards:
            - default_zoom: 16
              entities:
              - entity: device_tracker.usb_tracker
                name: Boat
              - entity: zone.pedder_bay_slip
                name: Slip
              - entity: device_tracker.anchorage_tracker
                name: Anchorage
              geo_location_sources: []
              hours_to_show: 0
              type: map
            - cards:
              - card_mod:
                  style: "ha-card {\n  border-radius: 6px;\n  padding: 4px 6px;\n\
                    \  font-size: 0.85rem;\n  min-height: 34px;\n  --mdc-icon-size:\
                    \ 20px;\n}\n"
                entity: input_number.slip_radius
                icon: mdi:map-marker-radius
                icon_color: blue
                primary: Slip Radius
                secondary: "{% set r = state_attr('zone.pedder_bay_slip','radius')\
                  \ | float(0) %} {% if r < 1000 %}\n  {{ r | round(0) }}\u202Fm\n\
                  {% else %}\n  {{ (r / 1000) | round(2) }}\u202Fkm\n{% endif %}\n"
                tap_action:
                  action: more-info
                type: custom:mushroom-template-card
              - card:
                  card_mod:
                    style: "ha-card {\n  border-radius: 6px;\n  padding: 4px 6px;\n\
                      \  font-size: 0.85rem;\n  min-height: 34px;\n  --mdc-icon-size:\
                      \ 20px;\n}\n"
                  entity: input_number.anchorage_radius
                  icon: mdi:anchor
                  icon_color: blue
                  primary: Anchorage Radius
                  secondary: "{% set r = states('input_number.anchorage_radius') |\
                    \ float(0) %} {% if r < 1000 %}\n  {{ r | round(0) }}\u202Fm\n\
                    {% else %}\n  {{ (r / 1000) | round(2) }}\u202Fkm\n{% endif %}\n"
                  tap_action:
                    action: more-info
                  type: custom:mushroom-template-card
                conditions:
                - condition: state
                  entity: input_boolean.anchorage_set
                  state: 'on'
                type: conditional
              type: horizontal-stack
            type: vertical-stack
          card_mod:
            style: "ha-card {\n  border: 3px solid orange;\n  border-radius: 8px;\n\
              \  padding: 6px;\n}\n"
          type: custom:mod-card
        conditions:
        - condition: or
          conditions:
          - condition: state
            entity: input_boolean.anchorage_set
            state: 'on'
          - condition: and
            conditions:
            - condition: state
              entity: input_boolean.anchorage_set
              state: 'off'
            - condition: state
              entity: input_boolean.in_slip
              state: 'off'
        type: conditional
      - card:
          card_mod:
            style: "ha-card {\n  width: 100%;\n  animation: flash 1s infinite;\n \
              \ background-color: red !important;\n  color: white !important;\n  text-align:\
              \ center;\n  font-size: 1.6rem;\n  font-weight: bold;\n  padding: 20px;\n\
              \  border: 4px solid white;\n  border-radius: 12px;\n}\n\n@keyframes\
              \ flash {\n  0%   { opacity: 1; }\n  50%  { opacity: 0.4; }\n  100%\
              \ { opacity: 1; }\n}\n"
          icon: mdi:water-alert
          icon_color: red
          primary: "\u26A0\uFE0F HIGH WATER IN BILGE \u26A0\uFE0F"
          secondary: Immediate attention required
          type: custom:mushroom-template-card
        conditions:
        - entity: binary_sensor.sonoff_snzb_05p
          state: 'on'
        type: conditional
      - cards:
        - cards:
          - card_mod:
              style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_1_on','on')\
                \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
            color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_1_on'',''on'')
              %} {{ ''amber'' if on else ''gray'' }}

              '
            features_position: bottom
            icon: mdi:water-pump
            primary: Pump 1
            secondary: "{{ states('sensor.system_pump_switch_sensor_pump_1_cycles')\
              \ | int }} - \u21BB\n"
            type: custom:mushroom-template-card
          - card:
              card_mod:
                style: "ha-card {\n  background-color: color-mix(in srgb, orange 20%,\
                  \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n}\n"
              features_position: bottom
              multiline_secondary: true
              secondary: '{% set today = states(''sensor.pump_1_on_time_today'') |
                float(0) %}

                {% set week = states(''sensor.pump_1_on_time_this_week'') | float(0)
                %}

                {% set today_h = (today * 60) // 60 %}

                {% set today_m = (today * 60) % 60 %}

                {% set week_h = (week * 60) // 60 %}

                {% set week_m = (week * 60) % 60 %}

                Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                }} h

                Week : {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                h

                '
              type: custom:mushroom-template-card
            conditions:
            - condition: state
              entity: binary_sensor.pump_1_high_runtime
              state: 'on'
            type: conditional
          type: vertical-stack
        - cards:
          - card_mod:
              style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_2_on','on')\
                \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
            color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_2_on'',''on'')
              %} {{ ''amber'' if on else ''gray'' }}

              '
            features_position: bottom
            icon: mdi:water-pump
            primary: Pump 2
            secondary: "{{ states('sensor.system_pump_switch_sensor_pump_2_cycles')\
              \ | int }} - \u21BB\n"
            type: custom:mushroom-template-card
          - card:
              card_mod:
                style: "ha-card {\n  background-color: color-mix(in srgb, orange 20%,\
                  \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n}\n"
              features_position: bottom
              multiline_secondary: true
              secondary: '{% set today = states(''sensor.pump_2_on_time_today'') |
                float(0) %}

                {% set week = states(''sensor.pump_2_on_time_this_week'') | float(0)
                %}

                {% set today_h = (today * 60) // 60 %}

                {% set today_m = (today * 60) % 60 %}

                {% set week_h = (week * 60) // 60 %}

                {% set week_m = (week * 60) % 60 %}

                Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                }} h

                Week : {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                h

                '
              type: custom:mushroom-template-card
            conditions:
            - condition: state
              entity: binary_sensor.pump_2_high_runtime
              state: 'on'
            type: conditional
          type: vertical-stack
        - cards:
          - card_mod:
              style: "ha-card {\n  --c: {% set on = is_state('binary_sensor.system_pump_switch_sensor_pump_3_on','on')\
                \ %}\n    {{ 'gold' if on else 'gray' }};\n  border: 3px solid var(--c);\n\
                \  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
                \  border-radius: 8px;\n  padding: 0px 12px;\n}\n"
            color: '{% set on = is_state(''binary_sensor.system_pump_switch_sensor_pump_3_on'',''on'')
              %} {{ ''amber'' if on else ''gray'' }}

              '
            features_position: bottom
            icon: mdi:water-pump
            primary: Pump 3
            secondary: "{{ states('sensor.system_pump_switch_sensor_pump_3_cycles')\
              \ | int }} - \u21BB\n"
            type: custom:mushroom-template-card
          - card:
              card_mod:
                style: "ha-card {\n  background-color: color-mix(in srgb, orange 20%,\
                  \ transparent);\n  border-radius: 2px;\n  padding: 0px 12px;\n}\n"
              features_position: bottom
              multiline_secondary: true
              secondary: '{% set today = states(''sensor.pump_3_on_time_today'') |
                float(0) %}

                {% set week = states(''sensor.pump_3_on_time_this_week'') | float(0)
                %}

                {% set today_h = (today * 60) // 60 %}

                {% set today_m = (today * 60) % 60 %}

                {% set week_h = (week * 60) // 60 %}

                {% set week_m = (week * 60) % 60 %}

                Today: {{ "%02.0f"|format(today_h) }}:{{ "%02.0f"|format(today_m)
                }} h

                Week : {{ "%02.0f"|format(week_h) }}:{{ "%02.0f"|format(week_m) }}
                h

                '
              type: custom:mushroom-template-card
            conditions:
            - condition: state
              entity: binary_sensor.pump_3_high_runtime
              state: 'on'
            type: conditional
          type: vertical-stack
        type: horizontal-stack
      - cards:
        - card_mod:
            style: "ha-card {\n  {% set t = states('sensor.bilge_temperature_f') |\
              \ float(0) %}\n  {% if t < 33 %}\n    background-color: color-mix(in\
              \ srgb, lightblue 20%, transparent);\n    border: 3px solid lightblue;\n\
              \  {% elif t < 37 %}\n    background-color: color-mix(in srgb, blue\
              \ 20%, transparent);\n    border: 3px solid blue;\n  {% elif t > 85\
              \ %}\n    background-color: color-mix(in srgb, gold 20%, transparent);\n\
              \    border: 3px solid gold;\n  {% elif t > 95 %}\n    background-color:\
              \ color-mix(in srgb, red 20%, transparent);\n    border: 3px solid red;\n\
              \  {% else %}\n    background-color: color-mix(in srgb, green 10%, transparent);\n\
              \    border: 3px solid green;\n  {% endif %}\n  border-radius: 8px;\n\
              \  padding: 0px 1px;\n}\n"
          color: '{% set t = states(''sensor.bilge_temperature_f'') | float(0) %}
            {% if t < 33 %} blue {% elif t < 37 %} blue {% elif t > 85 %} amber {%
            elif t > 95 %} red {% else %} green {% endif %}

            '
          features_position: bottom
          icon: mdi:thermometer
          primary: Bilge Temperature
          secondary: "{% set t = states('sensor.bilge_temperature_f') | float(0) %}\
            \ {{ t }} \xB0F\n"
          type: custom:mushroom-template-card
          vertical: true
        - card:
            card_mod:
              style: "ha-card {\n  background-color: #b3d9ff;\n  color: #003366;\n\
                \  border-radius: 12px;\n  padding: 8px;\n  font-weight: 600;\n  border:\
                \ 2px solid #4a90e2;\n}\n"
            entity: input_boolean.show_bilge_camera
            icon: mdi:video-outline
            name: Bilge Camera
            show_state: false
            tap_action:
              action: toggle
            type: button
          conditions:
          - condition: state
            entity: sensor.bilge_cam_online
            state: online
          type: conditional
        - card:
            card_mod:
              style: "ha-card {\n  background-color: color-mix(in srgb, orange 20%,\
                \ white);\n  border-radius: 8px;\n  padding: 8px;\n  border: 2px solid\
                \ orange;\n  font-weight: 600;\n}\n"
            color: amber
            features_position: bottom
            icon: mdi:alert
            primary: Bilge CAM Offline
            secondary: Check connection
            type: custom:mushroom-template-card
            vertical: true
          conditions:
          - condition: state
            entity: sensor.bilge_cam_online
            state_not: offline
          type: conditional
        - card_mod:
            style: "ha-card {\n  --spacing: 0px !important;\n  --icon-size: 24px !important;\n\
              \  {% set h = states('sensor.deck_humidity') | float(0) %}\n  {% if\
              \ h < 40 %}\n    --c: lightblue;\n  {% elif h < 60 %}\n    --c: green;\n\
              \  {% elif h < 75 %}\n    --c: gold;\n  {% else %}\n    --c: red;\n\
              \  {% endif %}\n  border: 3px solid var(--c);\n  background-color: color-mix(in\
              \ srgb, var(--c) 10%, transparent);\n  border-radius: 8px;\n  padding:\
              \ 0px 1px;\n}\n"
          color: "{% set h = states('sensor.bilge_humidity') | float(0) %} {% if h\
            \ < 40 %}\n  blue\n{% elif h < 60 %}\n  green\n{% elif h < 75 %}\n  amber\n\
            {% else %}\n  red\n{% endif %}\n"
          features_position: bottom
          icon: mdi:water-percent
          primary: Bilge Humidity
          secondary: "{% set h = states('sensor.bilge_humidity') | float(0) %} {%\
            \ set t = states('sensor.bilge_temperature_f') | float(0) %} {# Convert\
            \ F \u2192 C #} {% set tc = (t - 32) * 5/9 %} {# Magnus formula for dew\
            \ point #} {% set a = 17.62 %} {% set b = 243.12 %} {% set gamma = (a\
            \ * tc / (b + tc)) + (h/100) | log %} {% set dp_c = (b * gamma) / (a -\
            \ gamma) %} {# Convert back to F #} {% set dp_f = (dp_c * 9/5) + 32 %}\
            \ {{ h | round(0) }}% \u2022 {{ dp_f | round(1) }}\xB0F\n"
          type: custom:mushroom-template-card
          vertical: true
        type: horizontal-stack
      - card:
          card:
            camera_view: live
            card_mod:
              style: "ha-card {\n  border: 3px solid orange;\n  border-radius: 8px;\n\
                \  background-color: color-mix(in srgb, red 10%, transparent);\n \
                \ padding: 0px;\n}\n"
            content: Bilge Camera temporarily disabled
            entity: camera.bilge_bilge_camera
            fit_mode: cover
            name: Bilge Video Stream
            show_name: true
            show_state: false
            type: markdown
          conditions:
          - condition: state
            entity: binary_sensor.bilge_cam_online
            state_not: 'off'
          type: conditional
        conditions:
        - condition: or
          conditions:
          - condition: state
            entity: binary_sensor.pump_1_high_runtime
            state: 'on'
          - condition: state
            entity: binary_sensor.pump_2_high_runtime
            state: 'on'
          - condition: state
            entity: binary_sensor.pump_3_high_runtime
            state: 'on'
          - condition: state
            entity: input_boolean.show_bilge_camera
            state: 'on'
        type: conditional
      - cards:
        - area: system
          card_mod:
            style: "ha-card {\n  --c: {% set s = states('sensor.start_battery_state')\
              \ %}\n    {% if s == 'charging' %} green\n    {% elif s == 'resting'\
              \ %} blue\n    {% elif s == 'discharging' %} orange\n    {% elif s ==\
              \ 'low' %} yellow\n    {% elif s == 'veryLow' %} red\n    {% elif s\
              \ == 'disconnected' %} grey\n    {% else %} grey\n    {% endif %};\n\
              \  border: 3px solid var(--c);\n  background-color: color-mix(in srgb,\
              \ var(--c) 10%, transparent);\n  border-radius: 8px;\n  padding: 0px\
              \ 1px;\n}\n"
          entity: sensor.system_12v_battery_monitor_starting_battery_voltage
          features_position: bottom
          icon: mdi:car-battery
          icon_color: '{% set s = states(''sensor.start_battery_state'') %} {% if
            s == ''charging'' %} green {% elif s == ''resting'' %} blue {% elif s
            == ''discharging'' %} orange {% elif s == ''low'' %} yellow {% elif s
            == ''veryLow'' %} red {% elif s == ''disconnected'' %} grey {% else %}
            grey {% endif %}

            '
          primary: Start Battery
          secondary: "{% set v = states('sensor.system_12v_battery_monitor_starting_battery_voltage')\
            \ %} {% set s = states('sensor.start_battery_state') %} {% if s == 'disconnected'\
            \ %}\n    {{ \"%.2f\" | format(v | float) }}\u202FV - <>\n{% elif s ==\
            \ 'verylow' %}\n    {{ \"%.2f\" | format(v | float) }}\u202FV \u2014 \U0001FAAB\
            !!\n{% elif s == 'low' %}\n    {{ \"%.2f\" | format(v | float) }}\u202F\
            V \u2014 \U0001FAAB\n{% elif s == 'discharging' %}\n    {{ \"%.2f\" |\
            \ format(v | float) }}\u202FV \u2014 \u2935\n{% elif s == 'resting' %}\n\
            \    {{ \"%.2f\" | format(v | float) }}\u202FV \u2014 \n{% elif s == 'charging'\
            \ %}\n    {{ \"%.2f\" | format(v | float) }}\u202FV \u2014 \u26A1\n{%\
            \ else %} unknown {% endif %}\n"
          type: custom:mushroom-template-card
        - card:
            card_mod:
              style: "ha-card {\n  {% set s = states('sensor.pixel_4a_battery_state')\
                \ %}\n  {% if s == 'charging' %}\n    --c: green;\n  {% else %}\n\
                \    --c: red;\n  {% endif %}\n  border: 3px solid var(--c);\n  background-color:\
                \ color-mix(in srgb, var(--c) 10%, transparent);\n  border-radius:\
                \ 8px;\n  padding: 2px 4px;\n}\n"
            icon: mdi:power-socket-au
            icon_color: "{% set s = states('sensor.pixel_4a_battery_state') %} {%\
              \ if s == 'charging' %}\n  green\n{% else %}\n  red\n{% endif %}\n"
            primary: Shore Power
            secondary: "{% set s = states('sensor.pixel_4a_battery_state') %} {% if\
              \ s == 'charging' %}\n  Connected\n{% else %}\n  Not Connected\n{% endif\
              \ %}\n"
            type: custom:mushroom-template-card
          conditions:
          - condition: or
            conditions:
            - condition: state
              entity: sensor.start_battery_state
              state_not: charging
            - condition: state
              entity: sensor.house_battery_state
              state_not: charging
          type: conditional
        - area: system
          card_mod:
            style: "ha-card {\n  --spacing: 0px !important;\n  --icon-size: 24px !important;\n\
              \  --c: {% set s = states('sensor.house_battery_state') %}\n    {% if\
              \ s == 'charging' %} green\n    {% elif s == 'resting' %} blue\n   \
              \ {% elif s == 'discharging' %} orange\n    {% elif s == 'low' %} yellow\n\
              \    {% elif s == 'veryLow' %} red\n    {% elif s == 'disconnected'\
              \ %} grey\n    {% else %} grey\n    {% endif %};\n  border: 3px solid\
              \ var(--c);\n  background-color: color-mix(in srgb, var(--c) 10%, transparent);\n\
              \  border-radius: 8px;\n  padding: 0px 1px;\n}\n"
          entity: sensor.system_12v_battery_monitor_house_battery_voltage
          features_position: bottom
          icon: mdi:car-battery
          icon_color: '{% set s = states(''sensor.house_battery_state'') %} {% if
            s == ''charging'' %} green {% elif s == ''resting'' %} blue {% elif s
            == ''discharging'' %} orange {% elif s == ''low'' %} yellow {% elif s
            == ''veryLow'' %} red {% elif s == ''disconnected'' %} grey {% else %}
            grey {% endif %}

            '
          primary: House Battery
          secondary: "{% set v = states('sensor.system_12v_battery_monitor_house_battery_voltage')\
            \ %} {% set s = states('sensor.house_battery_state') %} {% if s == 'disconnected'\
            \ %}  \u26D4\u26D4 {% elif s == 'verylow' %}\n    {{ \"%.2f\" | format(v\
            \ | float) }}\u202FV \u2014 \U0001FAAB!!\n{% elif s == 'low' %}\n    {{\
            \ \"%.2f\" | format(v | float) }}\u202FV \u2014 \U0001FAAB\n{% elif s\
            \ == 'discharging' %}\n    {{ \"%.2f\" | format(v | float) }}\u202FV \u2014\
